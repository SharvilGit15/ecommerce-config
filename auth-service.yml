server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/workspace
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ThisIsASecretKeyForJWTTokenGenerationPleaseChangeInProduction123456
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: "*"
